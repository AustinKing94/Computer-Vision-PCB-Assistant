<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app">
        <header>
            <h1>PCB Diagnostic Assistant</h1>
            <span class="status" id="status-text">Ready</span>
        </header>

        <div class="stage">
            <!-- Image -->
            <div class="image-panel">
                <img id="pcb-display" src="{{ url_for('get_current_image') }}" alt="PCB View">
            </div>

            <!-- Controls sidebar -->
            <div class="controls">
                <button class="btn btn-primary" id="btn-capture">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    Capture
                </button>

                <div class="toggle-row">
                    <span>Thermal</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-thermal">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn" id="btn-save">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save
                </button>

                <a href="{{ url_for('gallery') }}" class="btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Gallery
                </a>
            </div>
        </div>

        <!-- BOM Panel -->
        <div class="bom-panel">
            <h2>Bill of Materials</h2>
            <div id="bom-content">
                <p class="bom-empty">No capture yet — run a capture to generate a BOM.</p>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
