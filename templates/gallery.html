<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved PCBs - PCB Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="dashboard">
        <header class="header-with-actions">
            <div>
                <h1>Saved Inspections</h1>
                <p class="status">Local Storage</p>
            </div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </a>
        </header>

        <section class="gallery-grid">
            {% if captures %}
                {% for capture in captures %}
                <div class="gallery-card">
                    <img src="/api/capture/{{ capture.filename }}" alt="PCB Capture">
                    <div class="card-details">
                        <span class="card-title">{{ capture.filename }}</span>
                        <span class="card-date">{{ capture.date }}</span> 
                    </div>
                    <div class="card-actions">
                        
                        <button class="btn btn-primary" onclick="loadCapture('{{ capture.filename }}')" title="Load to dashboard">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                        
                        <button class="btn btn-secondary" onclick="exportCapture('{{ capture.filename }}')" title="Export image">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                        
                        <button class="btn btn-danger" onclick="deleteCapture('{{ capture.filename }}')" title="Delete image">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>

                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">
                    <p>No captures saved yet. Start by capturing images on the dashboard!</p>
                </div>
            {% endif %}
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
