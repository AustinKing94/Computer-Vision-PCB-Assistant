<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved PCBs - PCB Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="dashboard">
        <header class="header-with-actions">
            <div>
                <h1>Saved Inspections</h1>
                <p class="status">Local Storage</p>
            </div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </a>
        </header>

        <section class="gallery-grid">
            <div class="gallery-card" onclick="openModal('{{ pcb.id }}', '{{ pcb.image_url }}')">
                <img src="https://via.placeholder.com/300x200.png?text=PCB+Capture" alt="Stored PCB">
                <div class="card-details">
                    <span class="card-title">Capture_001.jpg</span>
                    <span class="card-date">Mar 30, 2026</span>
                </div>
            </div>
            </section>
    </main>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title">Capture Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </header>
            
            <div class="modal-body">
                <div class="image-wrapper">
                    <img id="modal-image" src="" alt="Detailed PCB View">
                </div>
            </div>

            <footer class="controls modal-controls">
                <div class="toggle-group">
                    <span class="toggle-label">Thermal Overlay</span>
                    <label class="switch">
                        <input type="checkbox" id="modal-toggle-thermal">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" id="btn-export">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Export
                    </button>
                    <button class="btn btn-danger" id="btn-delete">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Delete
                    </button>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
